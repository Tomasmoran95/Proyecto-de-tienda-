<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador tienda</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- Librería SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <h1>Tienda Virtual</h1>

  <h2>Productos</h2>
  <div id="catalogo"></div>

  <h2>Carrito</h2>
  <ul id="carrito"></ul>

  <p id="total"></p>

  <button id="vaciar">Vaciar carrito</button>
  <button id="comprar">Finalizar compra</button>

  <div id="checkout">
    <h2>Datos del comprador</h2>

    <form id="formCheckout">
      <input type="text" id="nombre" placeholder="Nombre completo" required>
      <input type="email" id="email" placeholder="Correo electrónico" required>
      <input type="text" id="direccion" placeholder="Dirección" required>
      <input type="text" id="tarjeta" placeholder="Número de tarjeta (16 dígitos)" maxlength="16" required>
      <input type="text" id="cvv" placeholder="CVV (3 dígitos)" maxlength="3" required>

      <button type="submit" id="Pago">Confirmar Pago</button>
    </form>
  </div>

  
  
  <script src="/tienda.js"></script>
</body>
</html>
